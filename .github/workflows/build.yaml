#        uses: docker/login-action@v3
#        with:
#          username: ${{ inputs.dockerhub-username }}
#          password: ${{ secrets.dockerhub-token }}
      - name: Build and export to Docker
        uses: docker/build-push-action@v6
        with:
          context: .
#          load: true
          platforms: linux/amd64
          tags: ${{ env.TEST_TAG }}
